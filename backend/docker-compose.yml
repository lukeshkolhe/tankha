# Local Postgres for development. `docker compose up -d` then `npm run prisma:migrate`.
services:
  postgres:
    image: postgres:16-alpine
    container_name: tankha-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tankha
      POSTGRES_PASSWORD: tankha
      POSTGRES_DB: tankha
    ports:
      - '5432:5432'
    volumes:
      - tankha-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U tankha']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tankha-pg-data:
